[build]
  # 构建命令
  command = "npm run build"
  # 发布目录
  publish = "dist"
  # Node.js版本
  environment = { NODE_VERSION = "20" }

[build.environment]
  # 环境变量
  VITE_API_BASE_URL = "https://your-api-domain.com"

[[redirects]]
  # SPA路由支持
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  # API代理
  from = "/api/*"
  to = "https://your-backend-api.com/:splat"
  status = 200
  force = true

[[headers]]
  # 安全头配置
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https: wss:;"

[[headers]]
  # 静态资源缓存
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[dev]
  # 开发服务器配置
  command = "npm run dev"
  targetPort = 3000
  port = 8888
  publish = "dist"
